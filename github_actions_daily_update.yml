name: Daily Update - Oil Prices & Polymarket

on:
  schedule:
    # 09:00 UTC = Precios de petróleo (después de apertura mercado)
    - cron: '0 9 * * *'
    # 10:00 UTC = Polymarket (después de precios)
    - cron: '0 10 * * *'
  # Permitir ejecución manual
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Oil Prices
        run: python scripts/fetch_oil_prices.py
        continue-on-error: true

      - name: Fetch Polymarket Data
        run: python scripts/fetch_polymarket.py
        continue-on-error: true

      - name: Calculate Risk Scores
        run: python scripts/calculate_scores.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/dashboard.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update data: $(date +'%Y-%m-%d %H:%M UTC')" && git push)
        continue-on-error: true
