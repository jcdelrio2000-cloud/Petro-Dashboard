name: Hourly News Update

on:
  schedule:
    # Cada hora en punto (múltiples ejecuciones)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch News
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python scripts/fetch_news.py
        continue-on-error: true

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/dashboard.db
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update news: $(date +'%Y-%m-%d %H:%M UTC')" && git push)
        continue-on-error: true
